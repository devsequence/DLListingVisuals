	<!--page-wrapper-->
	<div class="page-wrapper">
		@@include('./includes/_header.html')
		<!--page-content-->
		<div class="main-content">
			<section class="contact-top">
				<div class="container">
					<div class="title-section">
						<b>I would love to learn more about your business and
						</b>
						create visuals that support your growth.
					</div>
				</div>
			</section>
			<section class="contact">
				<div class="container">
					<div class="contact-form">
					<form>
						<div class="modal-input">
							<input type="text" name="Name" placeholder="Name*" required>
						</div>
						<div class="modal-input">
							<input type="text" name="Brand's name" placeholder="Brand's name">
						</div>
						<div class="modal-input">
							<input type="email" name="Email" placeholder="Email*">
						</div>
						<div class="modal-input">
							<input type="tel" name="Phone" placeholder="Phone*">
						</div>
						<div class="modal-input">
							<input type="text" name="from" placeholder="Where are you from?">
						</div>
						<div class="modal-input">
							<select>
								<option>Service you want</option>
								<option>Service you want</option>
								<option>Service you want</option>
							</select>
						</div>
						<div class="modal-input _full">
							<textarea name="message" placeholder="Tell us more about your needs & brand"></textarea>
						</div>
						<button type="button" class="btn-primary"><span>Book Now</span><img class="svg-convert" src="../static/images/arrow-white.svg" alt="arrow-white"></button>
					</form>
					</div>
				</div>
			</section>
		</div>
		<!--page-content-->
		@@include('./includes/_footer.html')
	</div>
